version: "3.9"

services:
  bot:
    build: .
    image: study-accountability-bot:latest
    container_name: study_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=${TIMEZONE:-UTC}
    volumes:
      # Persistent database + exports
      - ./data:/app/data
      # Persistent logs
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
